<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock and Go RD | Seguridad Inteligente</title>
    <link rel="icon" type="image/png" href="logo1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #05080a; color: white; overflow-x: hidden; }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('fondo1.jpeg');
            background-size: cover; background-position: center; background-attachment: fixed; z-index: -1;
        }

        header { position: absolute; top: 0; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 2000; }
        #imgLogo { height: 180px; filter: drop-shadow(0 0 25px rgba(0, 209, 255, 0.7)); mix-blend-mode: lighten; }

        nav ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        nav ul li a { color: white; text-decoration: none; font-weight: 800; text-transform: uppercase; text-shadow: 2px 2px 8px black; }

        section { padding: 100px 10%; position: relative; z-index: 10; }
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 20px black; }

        /* CATALOGO */
        #grid-catalogo { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 30px; text-align: center; transition: 0.4s; }
        .card:hover { transform: translateY(-15px); border-color: #00D1FF; }
        .card img { width: 100%; height: 250px; object-fit: contain; filter: drop-shadow(0 10px 20px black); }
        .precio-tag { color: #00D1FF; font-size: 1.4rem; font-weight: 700; margin: 15px 0; display: block; }
        .btn-wa { background: #00D1FF; color: black; border: none; padding: 15px; border-radius: 50px; font-weight: 900; width: 100%; cursor: pointer; }

        /* SLIDER */
        .comparison-slider { position: relative; width: 100%; max-width: 450px; margin: 20px auto; overflow: hidden; cursor: ew-resize; border-radius: 15px; }
        .img-before-fix { width: 100%; display: block; }
        #after-box { position: absolute; top: 0; left: 0; height: 100%; width: 50%; overflow: hidden; z-index: 2; }
        #img-lockandgo { height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .slider-bar { position: absolute; top: 0; bottom: 0; width: 3px; background: #00D1FF; left: 50%; z-index: 100; box-shadow: 0 0 15px #00D1FF; }
        .slider-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #00D1FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; z-index: 101; }
        .label-before, .label-after { position: absolute; top: 15px; z-index: 10; padding: 5px 10px; background: rgba(0,0,0,0.7); font-size: 0.7rem; font-weight: 800; border-radius: 5px; }
        .label-before { left: 15px; color: #ff4444; }
        .label-after { right: 15px; color: #00D1FF; }

        /* FORMULARIO */
        .formulario-container { max-width: 600px; margin: 0 auto; background: rgba(0, 0, 0, 0.6); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-form { background: #00D1FF; color: black; border: none; padding: 18px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }

        /* NOTIFICACIONES (LO QUE SE HABIA BORRADO) */
        #notification-box {
            position: fixed; bottom: 30px; left: -450px; 
            background: rgba(0, 0, 0, 0.9); border: 1px solid #00D1FF;
            padding: 15px 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px;
            z-index: 9999; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px);
        }
        #notification-box.show { left: 30px; }
        .noti-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00D1FF; }
        .noti-text { font-size: 0.8rem; color: white; }
        .noti-text b { color: #00D1FF; display: block; }

        .whatsapp-bubble { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5000; color: white; font-size: 35px; text-decoration: none; }

        @media (max-width: 480px) {
            #imgLogo { height: 100px; }
            .hero h1 { font-size: 2rem; }
            #notification-box { width: 90%; bottom: 110px; }
        }
    </style>
</head>
<body>

    <a href="https://wa.me/18094572656" class="whatsapp-bubble" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <header>
        <img src="logo1.png" alt="Lock and Go" id="imgLogo">
        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#catalogo">Catálogo</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <h1>MÁS PROTECCIÓN, MÁS VIDA.</h1>
        <p>Controla tu puerta desde cualquier lugar</p>
    </section>

    <section id="comparativa" style="text-align: center;">
        <h2>EL CAMBIO ES REAL</h2>
        <div class="comparison-slider" id="slider">
            <img src="antes.jpg.jpeg" class="img-before-fix"> 
            <div id="after-box"><img src="despues.jpg.jpeg" id="img-lockandgo"></div>
            <div class="label-before">TRADICIONAL</div>
            <div class="label-after">LOCK AND GO</div>
            <div id="bar" class="slider-bar"><div class="slider-button"><i class="fas fa-arrows-alt-h"></i></div></div>
        </div>
    </section>

    <div style="text-align: center; padding: 40px 0;">
        <h3>¿QUÉ TIPO DE PUERTA TIENES?</h3>
        <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
            <div onclick="seleccionarPuerta('Madera', this)" class="opcion-puerta" style="padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; min-width: 100px;">MADERA</div>
            <div onclick="seleccionarPuerta('Polimetal', this)" class="opcion-puerta" style="padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; min-width: 100px;">POLIMETAL</div>
            <div onclick="seleccionarPuerta('Hierro', this)" class="opcion-puerta" style="padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; min-width: 100px;">HIERRO</div>
        </div>
    </div>

    <section id="catalogo">
        <h2 style="text-align: center;">NUESTRA COLECCIÓN</h2>
        <div id="grid-catalogo"></div>
    </section>

    <section id="contacto">
        <div class="formulario-container">
            <h2>ÚNETE A NUESTRO SISTEMA EXCLUSIVO</h2>
            <form id="formCotizar">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="email" id="correo" placeholder="Correo electrónico" required>
                <select id="servicio">
                    <option value="Residencial">Cerraduras Residenciales</option>
                    <option value="Airbnb">Línea Airbnb</option>
                    <option value="Soporte">Soporte Técnico</option>
                </select>
                <textarea id="comentario" placeholder="¿Tienes alguna duda o detalle sobre tu puerta?" rows="3"></textarea>
                <button type="submit" class="btn-form">ENVIAR SOLICITUD</button>
            </form>
        </div>
    </section>

    <div id="notification-box">
        <img src="logo1.png" class="noti-img">
        <div class="noti-text" id="noti-content"></div>
    </div>

    <footer><p style="text-align: center; padding: 40px; opacity: 0.5;">&copy; 2026 LOCK AND GO RD</p></footer>

    <script>
    // 1. CONFIGURACIÓN (REEMPLAZA POR TU URL DE GOOGLE)
    const scriptURL = 'https://script.google.com/macros/s/AKfycby0sutlv1GoApDGjkEJLge2go-gTOPYTj6SznbzQ_rWc2VVMpnY7dEs8iZAdPMmGJabng/exec';

    const productos = [
        { nombre: "V80 PRO", precio: "Desde RD$18,699", imagen: "llavin1.png.png", desc: "Reconocimiento Facial 3D, palma, huellas, codigos, tarjeta de proximidad, Visión Nocturna y desbloqueo remoto." },
        { nombre: "AURUM X3 IA", precio: "Desde RD$31,699", imagen: "aurumx3ia.png", desc: "Triple cámara, Visión Nocturna, Reconocimiento Facial 3D, reconocimiento de palma, huellas dactilares, codigos, tarjeta de proximidad, inteligencia artificial incorporada y desbloqueo remoto." },
        { nombre: "H18 PRO MAX", precio: "Desde RD$17,699", imagen: "H18PROMAX.png", desc: "Reconocimiento Facial 3D, huellas, vision nocturna, codigos, tarjeta, timbre inteligente y desbloqueo remoto." }
    ];


    let puertaSeleccionada = "No especificada";

    function seleccionarPuerta(tipo, elemento) {
        puertaSeleccionada = tipo;
        document.querySelectorAll('.opcion-puerta').forEach(opt => opt.style.border = "none");
        elemento.style.border = "2px solid #00D1FF";
    }

    function renderCatalogo() {
        const container = document.getElementById('grid-catalogo');
        container.innerHTML = productos.map(p => `
            <div class="card">
                <img src="${p.imagen}" onerror="this.src='logo1.png'">
                <h3>${p.nombre}</h3>
                <span class="precio-tag">${p.precio}</span>
                <button class="btn-wa" onclick="window.open('https://wa.me/18094572656')">Solicitar Info</button>
            </div>
        `).join('');
    }

    function initSlider() {
        const slider = document.getElementById('slider');
        const afterBox = document.getElementById('after-box');
        const bar = document.getElementById('bar');
        const imgL = document.getElementById('img-lockandgo');
        if(!slider) return;
        const sync = () => { imgL.style.width = slider.offsetWidth + "px"; };
        const mover = (e) => {
            let x = (e.type.includes('touch')) ? e.touches[0].clientX : e.clientX;
            let r = slider.getBoundingClientRect();
            let p = ((x - r.left) / r.width) * 100;
            if(p >= 0 && p <= 100) { afterBox.style.width = p + "%"; bar.style.left = p + "%"; }
        };
        slider.addEventListener('mousemove', mover);
        slider.addEventListener('touchmove', mover);
        window.addEventListener('resize', sync);
        sync();
    }

    // ENVÍO AL EXCEL
    const formCotizar = document.getElementById('formCotizar');
    formCotizar.onsubmit = function(e) {
        e.preventDefault();
        const btn = formCotizar.querySelector('button');
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;

        const urlFinal = `${scriptURL}?nombre=${encodeURIComponent(document.getElementById('nombre').value)}&email=${encodeURIComponent(document.getElementById('correo').value)}&servicio=${encodeURIComponent(document.getElementById('servicio').value)}&mensaje=${encodeURIComponent(puertaSeleccionada)}&comentario=${encodeURIComponent(document.getElementById('comentario').value)}`;

        fetch(urlFinal, { method: 'GET', mode: 'no-cors' })
        .then(() => {
            alert("¡ÉXITO! Recibimos tu solicitud.");
            formCotizar.reset();
        })
        .finally(() => { btn.innerText = "ENVIAR SOLICITUD"; btn.disabled = false; });
    };

    // NOTIFICACIONES DINÁMICAS
    const ventas = [
        { nombre: "Pedro", ciudad: "Santo Domingo", modelo: "V80 PRO" },
        { nombre: "María", ciudad: "Santiago", modelo: "AURUM X3 IA" },
        { nombre: "José", ciudad: "La Romana", modelo: "H18 PRO MAX" }
    ];

    function mostrarNotificacion() {
        const notiBox = document.getElementById('notification-box');
        const content = document.getElementById('noti-content');
        const v = ventas[Math.floor(Math.random() * ventas.length)];
        content.innerHTML = `<b>${v.nombre} de ${v.ciudad}</b> acaba de cotizar un ${v.modelo}`;
        notiBox.classList.add('show');
        setTimeout(() => notiBox.classList.remove('show'), 5000);
    }

    window.addEventListener('DOMContentLoaded', () => {
        renderCatalogo();
        initSlider();
        setTimeout(mostrarNotificacion, 5000); // Primera a los 5 seg
        setInterval(mostrarNotificacion, 15000); // Luego cada 15 seg
    });
    </script>
</body>
</html>
