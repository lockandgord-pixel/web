        nav ul { list-style: none; display: flex; align-items: center; }
        nav ul li { margin-left: 25px; }
        nav ul li a { color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; text-transform: uppercase; }

        .social-top a { font-size: 1.2rem; color: white; margin-left: 15px; transition: 0.3s; }

        .hero {

            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

            padding: 50px 20px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
            transition: 0.5s;
        }
        .card:hover { transform: translateY(-15px); border-color: #00D1FF; background: rgba(0, 209, 255, 0.05); }

        .card img { 
            width: 100%; 
            height: 300px; 
            object-fit: contain; 
            margin-bottom: 20px;
            /* El truco para que se vean flotando sin fondo */
            mix-blend-mode: lighten; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .card h3 { font-size: 1.5rem; margin-bottom: 10px; color: #00D1FF; }
        .precio-tag { font-size: 1.8rem; font-weight: 800; color: #00FF88; margin: 15px 0; display: block; }

        .btn-wa { 
            background: #00D1FF; color: black; border: none; padding: 15px; 
            border-radius: 50px; font-weight: 800; cursor: pointer; width: 100%;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-wa:hover { box-shadow: 0 0 20px #00D1FF; transform: scale(1.02); }

            background: rgba(0, 0, 0, 0.6); 
            padding: 50px; border-radius: 40px; 
            border: 1px solid #00D1FF; text-align: center;
            backdrop-filter: blur(20px);
        }

        input, select { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(255, 255, 255, 0.05); color: white; font-size: 1rem;
        }

        .btn-form {

        }
