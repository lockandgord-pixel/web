    <style>
        /* 1. REGLAS DE ORO PARA EL FONDO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        html, body {

        /* Capa de fondo fija e inamovible */
        .bg-master {

            justify-content: center; 
            text-align: center;
            padding: 0 5%;
        }

            font-size: clamp(2.5rem, 8vw, 5rem); 
            color: #00D1FF; 
            text-shadow: 0 0 30px rgba(0, 209, 255, 0.5);

        }

        .titulo-seccion { text-align: center; font-size: 3.5rem; margin: 80px 0 40px; font-weight: 900; color: #fff; }

        #grid-catalogo { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; padding: 0 10%; margin-bottom: 100px;
        }

        .card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px; padding: 40px; 
            text-align: center; transition: 0.4s;
        }

        .card:hover { transform: translateY(-15px); border-color: #00D1FF; }

        .card img { 
            width: 100%; height: 350px; 
            object-fit: contain; 
            mix-blend-mode: lighten; 
            filter: drop-shadow(0 30px 40px rgba(0,0,0,1)); /* Flotación profunda */
            margin-bottom: 30px;
        }

        .precio-tag { color: #00FF88; font-size: 2.5rem; font-weight: 900; display: block; margin: 20px 0; }

        .btn-wa { background: #00D1FF; color: black; border: none; padding: 20px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 1rem; }

        /* NOSOTROS */
        .nosotros-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 0 10% 100px; }
        .info-box { background: rgba(0,0,0,0.4); padding: 50px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .info-box i { font-size: 3rem; color: #00D1FF; margin-bottom: 20px; }

        /* FORMULARIO Y PIE */
        .formulario-container { max-width: 700px; margin: 0 auto 100px; background: rgba(0,0,0,0.6); padding: 60px; border-radius: 50px; border: 1px solid rgba(0, 209, 255, 0.3); text-align: center; }
        input, select { width: 100%; padding: 20px; margin: 15px 0; border-radius: 15px; background: #111; color: white; border: 1px solid #333; font-size: 1rem; }
        .btn-form { background: #00D1FF; color: black; border: none; padding: 22px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; }

        .social-footer { margin-top: 50px; display: flex; justify-content: center; gap: 40px; }
        .social-footer a { color: white; font-size: 3.5rem; transition: 0.3s; }
        .social-footer a:hover { color: #00D1FF; transform: scale(1.2); }

        /* BURBUJA WHATSAPP */
        .whatsapp-bubble { position: fixed; bottom: 40px; right: 40px; background: #25d366; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-decoration: none; }
        .whatsapp-bubble i { color: white; font-size: 50px; }

        footer { padding: 80px; text-align: center; opacity: 0.5; }
    </style>
</head>
