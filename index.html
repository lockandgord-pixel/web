<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock and Go RD | Seguridad Élite</title>
    <link rel="icon" type="image/png" href="logo1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* EL DISEÑO MAESTRO DE AYER REGENERADO AQUÍ */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('fondo1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
            background-color: #05080a;
        }

        header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #imgLogo { height: 65px; mix-blend-mode: lighten; filter: drop-shadow(0 0 5px rgba(0,209,255,0.5)); }

        nav ul { list-style: none; display: flex; align-items: center; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .social-icon { font-size: 1.2rem; transition: 0.3s; color: white; }

        .hero { height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 3.5rem; color: #00D1FF; text-shadow: 0 0 20px rgba(0, 209, 255, 0.6); letter-spacing: 3px; }
        .hero p { font-size: 1.2rem; margin: 15px 0; }

        .btn-main { background: #00D1FF; color: black; padding: 14px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; transition: 0.3s; }

        .titulo-seccion { text-align: center; margin: 60px 0; font-size: 2.5rem; text-transform: uppercase; }

        #grid-catalogo { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; max-width: 1200px; margin: 0 auto; }

        .card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 25px; padding: 25px; backdrop-filter: blur(10px); 
            text-align: center; transition: 0.4s;
        }

        .card img { width: 100%; height: 260px; object-fit: contain; mix-blend-mode: lighten; margin-bottom: 15px; }

        .precio-tag { color: #00FF88; font-size: 1.6rem; font-weight: bold; display: block; margin: 15px 0; }

        .btn-wa { background: #00D1FF; color: black; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; }

        .whatsapp-bubble { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; z-index: 3000; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); text-decoration: none;
        }
        .whatsapp-bubble i { color: white; font-size: 35px; }

        .formulario-container { 
            max-width: 550px; margin: 80px auto; background: rgba(0,0,0,0.7); 
            padding: 45px; border-radius: 35px; border: 1px solid #00D1FF; 
            text-align: center; backdrop-filter: blur(15px);
        }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-form { background: #00D1FF; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }

        footer { text-align: center; padding: 60px; opacity: 0.5; }
    </style>
</head>
<body>

    <a href="https://wa.me/18292783114" class="whatsapp-bubble" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <header>
        <img src="logo1.png" alt="Lock and Go" id="imgLogo">
        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#productos-seccion">Catálogo</a></li>
                <li><a href="https://www.instagram.com/lockandgord/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a></li>
            </ul>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <h1>LOCK AND GO RD</h1>
        <p>Seguridad inteligente para tu tranquilidad total.</p>
        <a href="#productos-seccion" class="btn-main">EXPLORAR CATÁLOGO</a>
    </section>

    <section id="productos-seccion">
        <h2 class="titulo-seccion">Nuestra Selección</h2>
        <div id="grid-catalogo"></div>
    </section>

    <section id="contacto">
        <div class="formulario-container">
            <h2>CLUB VIP</h2>
            <p>Registra tu correo para ofertas y asesoría.</p>
            <form id="formCotizar">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="email" id="correo" placeholder="Correo electrónico" required>
                <select id="servicio">
                    <option value="Instalación">Instalación Profesional</option>
                    <option value="Airbnb">Línea Airbnb</option>
                </select>
                <button type="submit" class="btn-form">ENVIAR Y CONTACTAR</button>
            </form>
        </div>
    </section>

    <footer><p>&copy; 2026 Lock and Go RD</p></footer>

    <script>
        const productos = [
            { nombre: "V80 PRO", precio: "RD$18,699", imagen: "llavin1.png.png", descripcion: "Facial 3D y Acceso Remoto total." },
            { nombre: "AURUM X3 IA", precio: "RD$31,699", imagen: "aurumx3ia.png", descripcion: "triple cámara con Inteligencia Artificial." },
            { nombre: "H18 PRO MAX", precio: "RD$17,699", imagen: "H18PROMAX.png", descripcion: "Biometría avanzada y visión nocturna." }
        ];

        function mostrarProductos() {
            const contenedor = document.getElementById('grid-catalogo');
            if(!contenedor) return;
            contenedor.innerHTML = ""; 
            productos.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='logo1.png'">
                    <h3>${p.nombre}</h3>
                    <p>${p.descripcion}</p>
                    <span class="precio-tag">${p.precio}</span>
                    <button class="btn-wa" onclick="window.open('https://wa.me/18292783114?text=Cotizar modelo: ${p.nombre}')">WhatsApp</button>
                `;
                contenedor.appendChild(div);
            });
        }

        document.getElementById('formCotizar').addEventListener('submit', function(e) {
            e.preventDefault();
            const n = document.getElementById('nombre').value;
            const c = document.getElementById('correo').value;
            window.open(`https://wa.me/18292783114?text=Hola! Soy ${n}. Email: ${c}.`);
        });

        window.onload = mostrarProductos;
    </script>
</body>
</html>
