<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock and Go RD | Seguridad Inteligente</title>
    <link rel="icon" type="image/png" href="logo1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: #05080a;
            color: white;
            overflow-x: hidden;
        }

        /* FONDO MAESTRO */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('fondo1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
        }

        header {
            position: absolute;
            top: 0; width: 100%;
            background: transparent;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        #imgLogo { 
            height: 180px;
            width: auto;
            filter: drop-shadow(0 0 25px rgba(0, 209, 255, 0.7)) drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
            mix-blend-mode: lighten;
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        nav ul { 
            list-style: none; 
            display: flex; 
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }
        
        nav ul li a { 
            color: #ffffff !important; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 1rem; 
            text-transform: uppercase; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            display: block; 
            white-space: nowrap;
        }

        section { padding: 100px 10%; position: relative; z-index: 10; }

        .hero { 
            height: 90vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }

        .hero h1 { font-size: 3.5rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 20px rgba(0, 0, 0, 0.8); }

        .nosotros-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .info-box { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; transition: 0.4s; }
        .info-box:hover { border-color: #00D1FF; transform: translateY(-10px); }
        .info-box i { font-size: 2.5rem; color: #00D1FF; margin-bottom: 20px; }

            padding: 50px;
            text-align: center;
            border: 2px dashed #00D1FF;
            backdrop-filter: blur(10px);
        }
