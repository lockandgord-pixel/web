<!DOCTYPE html>

<body>

    <header>
        <div class="header-container">
            <img src="logo1.png" alt="Lock and Go" id="imgLogo">
            <nav>
                <ul>
                    <li><a href="#inicio">Inicio</a></li>

    <section id="inicio" class="hero">
