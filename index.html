  
  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock and Go RD | Seguridad Inteligente</title>
    <link rel="icon" type="image/png" href="logo1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: #05080a;
            color: white;
            overflow-x: hidden;
        }

        /* FONDO MAESTRO */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('fondo1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
        }

        /* NAVEGACIÓN TOTALMENTE LIMPIA */
        header {
            position: absolute;
            top: 0; width: 100%;
            background: transparent;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        /* LOGO MAXIMIZADO Y RESALTADO */
        #imgLogo { 
            height: 150px; /* Tamaño máximo para impacto */
            width: auto;
            /* Resalte de luz azul cian para que "brille" sobre el fondo */
            filter: drop-shadow(0 0 20px rgba(0, 209, 255, 0.8)) drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
            mix-blend-mode: lighten;
            transition: transform 0.3s ease;
        }
        #imgLogo:hover {
            transform: scale(1.05);
        }

        nav ul { list-style: none; display: flex; gap: 40px; }
        nav ul li a { 
            color: white; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            transition: 0.3s;
            text-shadow: 2px 2px 15px rgba(0,0,0,1);
        }
        nav ul li a:hover { color: #00D1FF; }

        /* SECCIONES */
        section { padding: 120px 10% 80px; position: relative; z-index: 10; }

        .hero { height: 75vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 5rem; font-weight: 900; color: #00D1FF; text-shadow: 0 0 40px rgba(0, 209, 255, 0.6); }

        /* NOSOTROS */
        .nosotros-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 50px; }
        .info-box { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 45px; 
            border-radius: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            transition: 0.4s;
        }
        .info-box:hover { border-color: #00D1FF; background: rgba(0, 209, 255, 0.05); }
        .info-box i { font-size: 3rem; color: #00D1FF; margin-bottom: 20px; }

        /* CATÁLOGO */
        #grid-catalogo { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 45px; margin-top: 60px; }
        .card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px; padding: 45px; 
            text-align: center; transition: 0.5s ease;
        }
        .card:hover { transform: translateY(-20px); border-color: #00D1FF; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .card img { 
            width: 100%; height: 350px; 
            object-fit: contain; 
            mix-blend-mode: lighten; 
            filter: drop-shadow(0 30px 40px rgba(0,0,0,1)); 
            margin-bottom: 30px;
        }

        .precio-tag { color: #00FF88; font-size: 2.5rem; font-weight: 900; margin: 20px 0; display: block; }
        .btn-wa { background: #00D1FF; color: black; border: none; padding: 20px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; font-size: 1rem; }

        /* CONTACTO Y REDES */
        .formulario-container { max-width: 700px; margin: 0 auto; background: rgba(0, 0, 0, 0.6); padding: 60px; border-radius: 50px; border: 1px solid rgba(0, 209, 255, 0.2); text-align: center; }
        input, select { width: 100%; padding: 20px; margin: 15px 0; border-radius: 15px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); font-size: 1rem; }
        .btn-form { background: #00D1FF; color: black; border: none; padding: 22px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; }

        .social-footer { margin-top: 50px; display: flex; justify-content: center; gap: 40px; }
        .social-footer a { color: white; font-size: 3rem; transition: 0.4s ease; }
        .social-footer a:hover { color: #00D1FF; transform: scale(1.3); filter: drop-shadow(0 0 15px #00D1FF); }

        /* WHATSAPP BUBBLE */
        .whatsapp-bubble { position: fixed; bottom: 40px; right: 40px; background: #25d366; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5000; box-shadow: 0 15px 35px rgba(0,0,0,0.7); text-decoration: none; transition: 0.3s; }
        .whatsapp-bubble i { color: white; font-size: 50px; }

        h2.titulo { font-size: 4rem; text-align: center; margin-bottom: 40px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 4px; }
        footer { padding: 60px; text-align: center; opacity: 0.4; font-size: 1rem; }
    </style>
</head>
