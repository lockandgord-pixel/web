    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('fondo1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
            background-color: #05080a;
        }

        header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            /* Quitamos difuminado del header */
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 20px;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #imgLogo { height: 65px; mix-blend-mode: lighten; filter: drop-shadow(0 0 8px rgba(0,209,255,0.6)); }

        nav ul { list-style: none; display: flex; align-items: center; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .social-icon { font-size: 1.2rem; transition: 0.3s; color: white; }

        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 3.8rem; color: #00D1FF; text-shadow: 0 0 20px rgba(0, 209, 255, 0.6); letter-spacing: 3px; font-weight: 800; }
        .hero p { font-size: 1.3rem; margin: 15px 0; font-weight: 300; }

        .btn-main { background: #00D1FF; color: black; padding: 14px 35px; border-radius: 50px; font-weight: bold; text-decoration: none; transition: 0.3s; box-shadow: 0 0 15px rgba(0, 209, 255, 0.3); }

        .titulo-seccion { text-align: center; margin: 80px 0 40px; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px; }

        #grid-catalogo { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 20px; max-width: 1200px; margin: 0 auto; }

        /* TARJETAS TOTALMENTE FLOTANTES (SIN DIFUMINADO) */
        .card { 
            background: rgba(255, 255, 255, 0.02); /* Casi invisible */
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 30px; 
            padding: 30px; 
            /* Quitamos el backdrop-filter (difuminado) */
            backdrop-filter: none; 
            text-align: center; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { 
            transform: translateY(-20px); 
            background: rgba(0, 209, 255, 0.05); 
            border-color: #00D1FF;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card img { 
            width: 100%; 
            height: 280px; 
            object-fit: contain; 
            mix-blend-mode: lighten; 
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .card h3 { font-size: 1.6rem; color: #00D1FF; margin-bottom: 10px; }
        .precio-tag { color: #00FF88; font-size: 1.8rem; font-weight: 800; display: block; margin: 15px 0; }

        .btn-wa { background: #00D1FF; color: black; border: none; padding: 15px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-wa:hover { transform: scale(1.05); box-shadow: 0 0 20px #00D1FF; }

        .whatsapp-bubble { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            width: 70px; height: 70px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; z-index: 3000; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-decoration: none;
            transition: 0.3s;
        }
        .whatsapp-bubble:hover { transform: scale(1.1) rotate(10deg); }
        .whatsapp-bubble i { color: white; font-size: 38px; }

        .formulario-container { 
            max-width: 600px; margin: 100px auto; 
            background: rgba(0,0,0,0.4); /* Fondo sutil para el formulario */
            padding: 50px; border-radius: 40px; border: 1px solid rgba(0, 209, 255, 0.3); 
            text-align: center; 
        }

        input, select { 
            width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            outline: none;
        }
        input:focus { border-color: #00D1FF; }

        .btn-form { background: #00D1FF; color: black; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; font-size: 1rem; }

        footer { text-align: center; padding: 80px; opacity: 0.4; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
