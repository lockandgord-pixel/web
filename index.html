<html lang="es">
<head>

    <style>
        /* RESET TOTAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }

        /* FONDO FIJO - CAPA 0 */
        body {
            background-color: #05080a;
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('fondo1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1; /* Se queda al fondo siempre */
        }

        /* CONTENIDO FLOTANTE - CAPA 1 */
        header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            background: rgba(0, 0, 0, 0.6); 
            border-radius: 20px;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #imgLogo { height: 60px; mix-blend-mode: lighten; filter: drop-shadow(0 0 8px #00D1FF); }

        nav ul { list-style: none; display: flex; align-items: center; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .social-icon { font-size: 1.2rem; color: #00D1FF; }

        /* SECCIONES */
        section { position: relative; z-index: 10; width: 100%; }

        .hero { 
            height: 90vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); color: #00D1FF; text-shadow: 0 0 20px rgba(0, 209, 255, 0.5); font-weight: 900; }
        .hero p { font-size: 1.2rem; margin-top: 10px; opacity: 0.9; }

        .btn-main { 
            margin-top: 30px;
            background: #00D1FF; color: black; padding: 15px 40px; 
            border-radius: 50px; font-weight: bold; text-decoration: none; 
            display: inline-block; transition: 0.3s;
        }

        /* CATÁLOGO TOTALMENTE TRANSPARENTE */
        .titulo-seccion { text-align: center; padding: 100px 0 50px; font-size: 2.5rem; letter-spacing: 5px; }

        #grid-catalogo { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 40px; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 25px; 
            padding: 25px; 
            text-align: center; 
            transition: 0.4s ease;
        }

        .card:hover { 
            transform: translateY(-15px); 
            background: rgba(0, 209, 255, 0.05); 
            border-color: #00D1FF;
        }

        .card img { 
            width: 100%; 
            height: 250px; 
            object-fit: contain; 
            mix-blend-mode: lighten; 
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
        }

        .precio-tag { color: #00FF88; font-size: 1.7rem; font-weight: 800; margin: 15px 0; display: block; }

        .btn-wa { 
            background: #00D1FF; color: black; border: none; padding: 12px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; 
        }

        /* FORMULARIO */
        .formulario-container { 
            max-width: 550px; 
            margin: 100px auto; 
            background: rgba(0, 0, 0, 0.7); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid #00D1FF; 
            text-align: center; 
        }

        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); 
        }

        .btn-form { background: #00D1FF; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }

        /* BURBUJA WHATSAPP */
        .whatsapp-bubble { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; z-index: 5000; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); text-decoration: none;
        }
        .whatsapp-bubble i { color: white; font-size: 35px; }

        footer { text-align: center; padding: 60px; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
